name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "🚀 Triggering Vercel deployment..."
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_lSznZTVRGnm7p0pYISNmZz4viJdA/wIrUzeIRSY" \
            -H "Content-Type: application/json" \
            -d '{"githubCommitSha": "'${{ github.sha }}'", "githubCommitMessage": "'${{ github.event.head_commit.message }}'"}'
          echo "✅ Deploy triggered!"
